name: "Infra Destroy"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - qa
          - prod

env:
  tf_version: "1.5.7"
  tg_version: "latest"
  AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  terragrunt:
    name: "Infra Destroy"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set environment variables
        run: |
          # Use workflow_dispatch input or default
          ENV="${{ github.event.inputs.environment }}"
          ENV="${ENV:-prod}"

          if [[ "$ENV" == "dev" ]]; then
            echo "tf_working_dir=infra/environments/dev" >> $GITHUB_ENV
          elif [[ "$ENV" == "qa" ]]; then
            echo "tf_working_dir=infra/environments/qa" >> $GITHUB_ENV
          else
            echo "tf_working_dir=infra/environments/prod" >> $GITHUB_ENV
          fi

          echo "ENVIRONMENT=$ENV" >> $GITHUB_ENV

          # Sanitize stack name: lowercase, truncate to 17 chars, _ -> -
          STACK_NAME="${GITHUB_REPOSITORY#*/}"
          STACK_NAME="${STACK_NAME//_/-}"
          STACK_NAME="${STACK_NAME,,}"
          STACK_NAME="${STACK_NAME:0:17}"

          echo "STACK_NAME=$STACK_NAME" >> $GITHUB_ENV

      - name: Terragrunt Init
        uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: ${{ env.tg_version }}
          tg_command: "init -input=false -upgrade"
          tg_dir: ${{ env.tf_working_dir }}
          tg_comment: "0"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          STACK_NAME: ${{ env.STACK_NAME }}

      - name: Terragrunt Destroy
        uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: ${{ env.tg_version }}
          tg_command: "destroy -auto-approve"
          tg_dir: ${{ env.tf_working_dir }}
          tg_comment: "0"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          STACK_NAME: ${{ env.STACK_NAME }}
