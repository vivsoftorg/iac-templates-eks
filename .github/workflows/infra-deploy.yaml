name: "Infra Deploy"

on:
  push:
    branches:
      - main
      - dev
      - qa
      - release/*
  pull_request:
    branches:
      - main
      - dev
      - qa
      - release/*

env:
  tf_version: "1.5.7"
  tg_version: "latest"
  AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  terragrunt:
    name: "Infra Deploy"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set environment variables
        run: |
          REF="${{ github.ref }}"

          # Determine environment and working directory from branch
          if [[ "$REF" == "refs/heads/dev" ]]; then
            echo "tf_working_dir=infra/environments/dev" >> $GITHUB_ENV
            echo "ENVIRONMENT=dev" >> $GITHUB_ENV
          elif [[ "$REF" == "refs/heads/qa" ]] || [[ "$REF" == refs/heads/release/* ]]; then
            echo "tf_working_dir=infra/environments/qa" >> $GITHUB_ENV
            echo "ENVIRONMENT=qa" >> $GITHUB_ENV
          else
            echo "tf_working_dir=infra/environments/prod" >> $GITHUB_ENV
            echo "ENVIRONMENT=prod" >> $GITHUB_ENV
          fi

          # Sanitize stack name: lowercase, truncate to 17 chars, replace _ with -
          STACK_NAME="${GITHUB_REPOSITORY#*/}"
          STACK_NAME="${STACK_NAME//_/-}"
          STACK_NAME="${STACK_NAME,,}"
          STACK_NAME="${STACK_NAME:0:17}"

          echo "STACK_NAME=$STACK_NAME" >> $GITHUB_ENV

      - name: Terragrunt Format
        uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: ${{ env.tg_version }}
          tg_command: "hcl fmt --check"
          tg_dir: ${{ env.tf_working_dir }}
          tg_comment: "0"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terragrunt backend bootstrap
        uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: ${{ env.tg_version }}
          tg_command: "backend bootstrap --non-interactive"
          tg_dir: ${{ env.tf_working_dir }}
          tg_comment: "0"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          STACK_NAME: ${{ env.STACK_NAME }}

      - name: Terragrunt Init
        uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: ${{ env.tg_version }}
          tg_command: "init -input=false -upgrade"
          tg_dir: ${{ env.tf_working_dir }}
          tg_comment: "0"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          STACK_NAME: ${{ env.STACK_NAME }}
          GH_USER: ${{ github.actor }}
          GH_TOKEN: ${{ github.token }}

      - name: TFSEC
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: true
          additional_args: --minimum-severity CRITICAL
          working_directory: ${{ env.tf_working_dir }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terragrunt Plan
        if: ${{ github.event_name == 'pull_request' }}
        uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: ${{ env.tg_version }}
          tg_command: "plan"
          tg_dir: ${{ env.tf_working_dir }}
          tg_comment: "1"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          STACK_NAME: ${{ env.STACK_NAME }}
          GH_USER: ${{ github.actor }}
          GH_TOKEN: ${{ github.token }}

      - name: Terragrunt Apply
        if: ${{ github.event_name != 'pull_request' }}
        uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: ${{ env.tg_version }}
          tg_command: "apply -auto-approve"
          tg_dir: ${{ env.tf_working_dir }}
          tg_comment: "0"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          STACK_NAME: ${{ env.STACK_NAME }}
          GH_USER: ${{ github.actor }}
          GH_TOKEN: ${{ github.token }}
